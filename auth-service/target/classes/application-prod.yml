spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false

logging:
  level:
    com.gmail.ramawthar.priyash.hybridstrength.authservice: INFO
    org.springframework.security: WARN
