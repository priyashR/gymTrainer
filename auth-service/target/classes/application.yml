spring:
  application:
    name: auth-service
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  access-token-expiry: 15m
  refresh-token-expiry: 7d

server:
  port: 8081
  error:
    include-message: never
    include-stacktrace: never
