apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: dev
data:
  SPRING_PROFILES_ACTIVE: prod
  DATABASE_URL: jdbc:postgresql://postgres:5432/auth_service
  SERVER_PORT: "8081"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: dev
type: Opaque
stringData:
  DATABASE_USERNAME: postgres
  DATABASE_PASSWORD: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: dev
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: dev
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
  type: NodePort
