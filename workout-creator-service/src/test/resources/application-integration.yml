spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/workout_creator_dev
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# JWT public key is intentionally absent here.
# The integration test generates its own RSA key pair and registers the public key
# via @TestConfiguration, overriding the JwtConfig bean.
