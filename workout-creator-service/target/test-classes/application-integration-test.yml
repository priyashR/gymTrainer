spring:
  datasource:
    url: jdbc:postgresql://localhost:30432/workout_creator_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# Gemini config — overridden at runtime via @DynamicPropertySource to point at WireMock
gemini:
  api-key: test-api-key
  base-url: http://localhost:9999
  model: gemini-test-model

# Resilience4j — reduce thresholds for faster test feedback
resilience4j:
  circuitbreaker:
    instances:
      gemini:
        sliding-window-size: 4
        failure-rate-threshold: 50
        wait-duration-in-open-state: 1s
        permitted-number-of-calls-in-half-open-state: 2

logging:
  level:
    com.gmail.ramawthar.priyash.hybridstrength.workoutcreator: DEBUG
    org.flywaydb: INFO
